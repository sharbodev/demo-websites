<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Белая Улыбка — Стоматологическая клиника</title>
    <script>
        (function() {
            // Detect viewport width
            const isMobile = window.innerWidth < 768;
            const targetFile = isMobile ? "mobile.html" : "desktop.html";
            
            // Seamless document replacement
            fetch(targetFile)
                .then(r => r.text())
                .then(html => {
                    document.open();
                    document.write(html);
                    document.close();
                })
                .catch(err => {
                    console.error("Routing error:", err);
                    window.location.replace(targetFile);
                });
        })();
    </script>
</head>
<body style="background: #0d0f14; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; margin: 0;">
    <div style="text-align: center;">
        <div style="width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #22d3ee; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        <div>Загрузка интерфейса...</div>
    </div>
</body>
</html>
